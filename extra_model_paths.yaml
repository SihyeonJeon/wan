# ---------------------------------------------------------------
# wan v4 — extra_model_paths.yaml
# 2026-04-29
# Declares every model-class path used by the v4 SOTA stack.
# Volume mount: /workspace/model/  (singular `model` per user spec;
#                                   v3 used /runpod-volume/models/).
# Anything ComfyUI would normally search under <comfy>/models/<key>/
# is also searched under <base_path>/<value>.
# ---------------------------------------------------------------

workspace_volume:
    base_path: /workspace/model/

    # ── Inherited from v3 (path migrated only) ──
    clip: clip/
    diffusion_models: diffusion_models/
    text_encoders: text_encoders/
    clip_vision: clip_vision/
    vae: vae/
    loras: loras/

    # ── Anime-base + identity + inpaint stack (v3) ──
    checkpoints: checkpoints/      # SDXL/Illustrious-XL v2.0-stable + JANKU v7.77
    controlnet: controlnet/        # Reference-only / depth / canny CN
    ipadapter: ipadapter/          # cubiq/ComfyUI_IPAdapter_plus weights
    pulid: pulid/                  # cubiq/PuLID_ComfyUI (pulid_v1.1.safetensors)
    inpaint: inpaint/              # nullquant/ComfyUI-BrushNet weights
                                   # (its README says place .safetensors in models/inpaint/)
    seethrough: seethrough/        # forward-compat; jtydhr88 default is models/SeeThrough/
                                   # — see start.sh symlink for actual binding
    insightface: insightface/      # PuLID-SDXL antelopev2 face encoder
    rmbg: rmbg/                    # 1038lab BEN2/SDMatte/BiRefNet weights
    upscale_models: upscale_models/

    # ── v4 NEW: textual inversion / embeddings ──
    embeddings: embeddings/        # Lazy Embeddings (lazypos.safetensors,
                                   # lazyneg.safetensors). ComfyUI core
                                   # auto-detects via this key.

    # WAN 2.2 는 UNETLoader 노드가 diffusion_models/ 에서 정상 로드.
    # `unet:` 별도 키 추가는 중복 매핑이 되므로 의도적으로 생략.

local_cached_volume:
    base_path: /comfyui/models/

    # ── Inherited from v3 ──
    clip: clip/
    diffusion_models: diffusion_models/
    text_encoders: text_encoders/
    clip_vision: clip_vision/
    vae: vae/
    loras: loras/
    checkpoints: checkpoints/
    controlnet: controlnet/
    ipadapter: ipadapter/
    pulid: pulid/
    inpaint: inpaint/
    seethrough: seethrough/
    insightface: insightface/
    rmbg: rmbg/
    upscale_models: upscale_models/

    # ── v4 NEW ──
    embeddings: embeddings/
